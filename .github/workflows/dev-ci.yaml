name: CI - Build, Test, and Lint

on:
  pull_request_target:
    branches:
      - main
      - release

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bun setup
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Client + Server
        run: bun run build

      - name: Run tests
        run: bun run test:run

      - name: Run formatting check
        run: bun run format:check

      - name: Run linters
        run: bun run lint
        
